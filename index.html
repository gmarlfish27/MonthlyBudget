<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Household Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <header class="mb-8 text-center">
            <h1 id="currentMonthYear" class="text-3xl font-bold text-blue-900">Monthly Budget</h1>
            <p class="text-slate-500">Data resets automatically on the 1st of every month.</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <form id="budgetForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Category</label>
                    <select id="category" class="w-full p-2 border rounded-md">
                        <option value="Mortgage">Mortgage</option>
                        <option value="Tithing">Tithing</option>
                        <option value="Tara's Spending">Tara's Spending</option>
                        <option value="Garett's Spending">Garett's Spending</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Amount ($)</label>
                    <input type="number" id="amount" step="0.01" required class="w-full p-2 border rounded-md" placeholder="0.00">
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded-md transition">
                        Add Expense
                    </button>
                </div>
            </form>
        </div>

        <!-- Budget Table -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="p-4 border-b">Category</th>
                        <th class="p-4 border-b">Total Spent</th>
                    </tr>
                </thead>
                <tbody id="budgetTableBody">
                    <!-- Rows injected by JavaScript -->
                </tbody>
                <tfoot class="bg-slate-50 font-bold">
                    <tr>
                        <td class="p-4">Total Monthly Outbound</td>
                        <td id="grandTotal" class="p-4 text-blue-900">$0.00</td>
                    </tr>
                </tfoot>
            </table>
        </div>
        
        <div class="mt-4 text-right">
            <button onclick="clearDataManually()" class="text-xs text-red-500 hover:underline">Manual Reset (Clear All Data)</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
