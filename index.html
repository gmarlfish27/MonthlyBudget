<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Declining Balance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans">

    <div class="max-w-2xl mx-auto py-8 px-4">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 id="monthDisplay" class="text-2xl font-bold text-blue-900 uppercase tracking-wide">Monthly Budget</h1>
        </header>

        <!-- The "Watch it Subtract" Hero Section -->
        <div class="bg-blue-900 text-white rounded-2xl p-8 shadow-xl mb-6 text-center">
            <p class="text-blue-200 text-sm uppercase font-bold mb-1">Balance Remaining</p>
            <h2 id="heroBalance" class="text-6xl font-black tracking-tight">$0.00</h2>
            <div class="mt-6 grid grid-cols-2 gap-4 border-t border-blue-800 pt-6">
                <div>
                    <p class="text-blue-300 text-xs uppercase">Total Income</p>
                    <div class="flex justify-center items-center">
                        <span class="mr-1">$</span>
                        <input type="number" id="incomeInput" class="bg-transparent border-b border-blue-700 text-xl font-bold w-24 text-center focus:outline-none" placeholder="0">
                    </div>
                </div>
                <div>
                    <p class="text-blue-300 text-xs uppercase">Tithing (<span id="tithRate">10</span>%)</p>
                    <p id="tithDeduction" class="text-xl font-bold text-blue-100">-$0.00</p>
                </div>
            </div>
        </div>

        <!-- Expense Entry Form -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <form id="expenseForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                        <select id="catInput" class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Mortgage">Mortgage</option>
                            <option value="Tara's Spending">Tara's Spending</option>
                            <option value="Garett's Spending">Garett's Spending</option>
                            <option value="Tithing">Tithing (Manual Add)</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Groceries">Groceries</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Amount</label>
                        <input type="number" id="amtInput" step="0.01" required class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg active:scale-95">
                    Subtract Expense
                </button>
            </form>
        </div>

        <!-- Transaction History -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-4 border-b bg-gray-50">
                <h3 class="text-sm font-bold text-gray-600 uppercase">Recent Activity</h3>
            </div>
            <div id="historyList" class="divide-y divide-gray-100 max-h-80 overflow-y-auto">
                <!-- Entries will appear here -->
            </div>
        </div>

        <div class="mt-8 text-center space-x-4">
            <button onclick="changeTithing()" class="text-xs text-blue-600 font-semibold hover:underline">Adjust Tithing %</button>
            <button onclick="resetApp()" class="text-xs text-red-500 font-semibold hover:underline">Reset Month</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
