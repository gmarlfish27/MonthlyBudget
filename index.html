:root {
 --bg: #f5f0e8;
 --paper: #fdfaf4;
 --ink: #1a1410;
 --accent: #b85c2a;
 --accent2: #2a6b4a;
 --muted: #7a6e62;
 --border: #d4c9b8;
 --danger: #c0392b;
 --positive: #27ae60;
 --shadow: 0 2px 12px rgba(26,20,16,0.10);
}
body {
 font-family: 'DM Mono', monospace;
 background: var(--bg);
 color: var(--ink);
 min-height: 100vh;
 padding: 2rem 1rem 4rem;
}
header {
 text-align: center;
 margin-bottom: 2.5rem;
}
header h1 {
 font-family: 'DM Serif Display', serif;
 font-size: clamp(2rem, 5vw, 3.2rem);
 color: var(--accent);
 letter-spacing: -0.5px;
 line-height: 1.1;
}
header h1 em {
 font-style: italic;
 color: var(--ink);
}
.month-bar {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 1rem;
 margin-top: 0.8rem;
 flex-wrap: wrap;
}
.month-label {
 font-size: 1rem;
 font-weight: 500;
 color: var(--muted);
 letter-spacing: 0.05em;
 text-transform: uppercase;
}
.income-bar {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 0.6rem;
 margin-top: 1rem;
}
.income-bar label {
 font-size: 0.75rem;
 text-transform: uppercase;
 letter-spacing: 0.1em;
 color: var(--muted);
}
.income-input-wrap {
 display: flex;
 align-items: center;
 gap: 0.3rem;
 background: var(--paper);
 border: 2px solid var(--accent2);
 border-radius: 3px;
 padding: 0.3rem 0.7rem;
}
.income-input-wrap span {
 font-size: 1rem;
 color: var(--accent2);
 font-weight: 500;
}
#incomeInput {
 font-family: 'DM Mono', monospace;
 font-size: 1.1rem;
 font-weight: 500;
 color: var(--ink);
 background: transparent;
 border: none;
 outline: none;
 width: 130px;
}
.btn {
 font-family: 'DM Mono', monospace;
 font-size: 0.8rem;
 font-weight: 500;
 padding: 0.4rem 1.1rem;
 border: 2px solid var(--ink);
 background: transparent;
 color: var(--ink);
 cursor: pointer;
 letter-spacing: 0.08em;
 text-transform: uppercase;
 transition: background 0.15s, color 0.15s;
 border-radius: 2px;
}
.btn:hover { background: var(--ink); color: var(--paper); }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: var(--danger); color: white; }
.btn.success { border-color: var(--accent2); color: var(--accent2); }
.btn.success:hover { background: var(--accent2); color: white; }
.card {
 background: var(--paper);
 border: 1.5px solid var(--border);
 border-radius: 4px;
 box-shadow: var(--shadow);
 padding: 1.5rem;
 margin-bottom: 1.5rem;
}
/* Budget input grid */
.budget-grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
 gap: 1.2rem;
 margin-bottom: 1.5rem;
}
.budget-item {
 background: var(--paper);
 border: 1.5px solid var(--border);
 border-radius: 4px;
 padding: 1rem 1.1rem 0.9rem;
 position: relative;
 transition: border-color 0.15s;
}
.budget-item:focus-within {
 border-color: var(--accent);
}
.budget-item label {
 display: block;
 font-size: 0.72rem;
 letter-spacing: 0.1em;
 text-transform: uppercase;
 color: var(--muted);
 margin-bottom: 0.5rem;
}
.budget-item .category-name {
 font-family: 'DM Serif Display', serif;
 font-size: 1.05rem;
 color: var(--ink);
 margin-bottom: 0.6rem;
}
.amount-row {
 display: flex;
 align-items: center;
 gap: 0.4rem;
}
.currency {
 font-size: 0.9rem;
 color: var(--muted);
}
.amount-input {
 font-family: 'DM Mono', monospace;
 font-size: 1.25rem;
 font-weight: 500;
 color: var(--ink);
 background: transparent;
 border: none;
 border-bottom: 1.5px solid var(--border);
 width: 100%;
 padding: 0.15rem 0;
 outline: none;
 transition: border-color 0.15s;
}
.amount-input:focus { border-color: var(--accent); }
.spent-label {
 font-size: 0.7rem;
 color: var(--muted);
 letter-spacing: 0.06em;
 text-transform: uppercase;
 margin-top: 0.7rem;
 margin-bottom: 0.25rem;
}
.remaining {
 font-size: 0.78rem;
 margin-top: 0.5rem;
 font-weight: 500;
}
.remaining.ok { color: var(--positive); }
.remaining.warn { color: #e67e22; }
.remaining.over { color: var(--danger); }
.delete-cat {
 position: absolute;
 top: 0.5rem;
 right: 0.6rem;
 background: none;
 border: none;
 color: var(--border);
 cursor: pointer;
 font-size: 1rem;
 line-height: 1;
 transition: color 0.15s;
 padding: 0;
}
.delete-cat:hover { color: var(--danger); }
.tithe-badge {
 display: inline-block;
 font-size: 0.65rem;
 text-transform: uppercase;
 letter-spacing: 0.08em;
 background: var(--accent);
 color: white;
 border-radius: 2px;
 padding: 0.1rem 0.4rem;
 margin-left: 0.4rem;
 vertical-align: middle;
}
.pct-row {
 display: flex;
 align-items: center;
 gap: 0.4rem;
 margin-bottom: 0.4rem;
}
.pct-input {
 font-family: 'DM Mono', monospace;
 font-size: 1.25rem;
 font-weight: 500;
 color: var(--ink);
 background: transparent;
 border: none;
 border-bottom: 1.5px solid var(--border);
 width: 70px;
 padding: 0.15rem 0;
 outline: none;
 transition: border-color 0.15s;
}
.pct-input:focus { border-color: var(--accent); }
.tithe-calc {
 font-size: 0.78rem;
 color: var(--muted);
 margin-top: 0.2rem;
}
/* Transactions */
.tx-header {
 display: flex;
 align-items: center;
 justify-content: space-between;
 margin-bottom: 1rem;
 flex-wrap: wrap;
 gap: 0.5rem;
}
.tx-header h2 {
 font-family: 'DM Serif Display', serif;
 font-size: 1.4rem;
}
.tx-form {
 display: grid;
 grid-template-columns: 1fr 1fr auto auto;
 gap: 0.7rem;
 align-items: end;
 margin-bottom: 1.2rem;
 flex-wrap: wrap;
}
@media(max-width: 620px) {
 .tx-form { grid-template-columns: 1fr 1fr; }
}
.form-group { display: flex; flex-direction: column; gap: 0.3rem; }
.form-group label {
 font-size: 0.7rem;
 text-transform: uppercase;
 letter-spacing: 0.09em;
 color: var(--muted);
}
.form-group input,
.form-group select {
 font-family: 'DM Mono', monospace;
 font-size: 0.9rem;
 background: var(--bg);
 border: 1.5px solid var(--border);
 color: var(--ink);
 padding: 0.45rem 0.7rem;
 border-radius: 3px;
 outline: none;
 transition: border-color 0.15s;
}
.form-group input:focus,
.form-group select:focus { border-color: var(--accent); }
table {
 width: 100%;
 border-collapse: collapse;
 font-size: 0.85rem;
}
thead tr {
 border-bottom: 2px solid var(--ink);
}
thead th {
 text-align: left;
 font-size: 0.68rem;
 text-transform: uppercase;
 letter-spacing: 0.1em;
 color: var(--muted);
 padding: 0.4rem 0.5rem;
}
tbody tr {
 border-bottom: 1px solid var(--border);
 transition: background 0.1s;
}
tbody tr:hover { background: var(--bg); }
tbody td {
 padding: 0.55rem 0.5rem;
}
.tx-amount { font-weight: 500; color: var(--danger); }
.tx-cat { color: var(--accent); font-size: 0.82rem; }
.tx-delete { background: none; border: none; cursor: pointer; color: var(--border); font-size: 1rem; transition: color 0.15s; }
.tx-delete:hover { color: var(--danger); }
/* Summary footer */
.summary {
 display: flex;
 gap: 1.5rem;
 flex-wrap: wrap;
 align-items: center;
 padding: 1.2rem 1.5rem;
 background: var(--ink);
 color: var(--paper);
 border-radius: 4px;
 margin-bottom: 1.5rem;
}
.summary-stat { display: flex; flex-direction: column; gap: 0.2rem; }
.summary-stat .s-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #a89e92; }
.summary-stat .s-val { font-size: 1.35rem; font-weight: 500; }
.summary-stat .s-val.green { color: #6fcf97; }
.summary-stat .s-val.red { color: #eb5757; }
/* Add category modal */
.modal-overlay {
 display: none;
 position: fixed; inset: 0;
 background: rgba(26,20,16,0.45);
 z-index: 100;
 align-items: center;
 justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
 background: var(--paper);
 border: 2px solid var(--ink);
 border-radius: 4px;
 padding: 2rem;
 width: min(400px, 95vw);
 display: flex;
 flex-direction: column;
 gap: 1rem;
}
.modal h3 {
 font-family: 'DM Serif Display', serif;
 font-size: 1.4rem;
}
.modal input {
 font-family: 'DM Mono', monospace;
 font-size: 0.95rem;
 background: var(--bg);
 border: 1.5px solid var(--border);
 color: var(--ink);
 padding: 0.55rem 0.8rem;
 border-radius: 3px;
 outline: none;
 width: 100%;
}
.modal input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 0.7rem; justify-content: flex-end; }
.reset-confirm { display: none; }
.reset-confirm.open { display: block; }
.empty-tx {
 text-align: center;
 padding: 2rem;
 color: var(--muted);
 font-size: 0.85rem;
 font-style: italic;
}
.progress-bar {
 margin-top: 0.5rem;
 height: 4px;
 background: var(--border);
 border-radius: 2px;
 overflow: hidden;
}
.progress-fill {
 height: 100%;
 border-radius: 2px;
 transition: width 0.3s;
}

<body>
<header>
<h1>Family <em>Budget</em></h1>
<div class="month-bar">
<span class="month-label" id="currentMonth"></span>
<button class="btn success" onclick="openModal()">+ Add Category</button>
<button class="btn danger" onclick="toggleResetConfirm()">↺ Reset Month</button>
</div>
<div class="income-bar">
<label>Monthly Income</label>
<div class="income-input-wrap">
<span>$</span>
<input type="number" id="incomeInput" min="0" step="0.01" placeholder="0.00" oninput="updateIncome(this.value)"/>
</div>
</div>
<div class="reset-confirm card" id="resetConfirm" style="margin-top:1rem; max-width:400px; margin-left:auto; margin-right:auto;">
<p style="margin-bottom:0.8rem; font-size:0.85rem;">Reset all spending for the new month? Budgeted amounts are kept.</p>
<div style="display:flex;gap:0.7rem;">
<button class="btn danger" onclick="resetMonth()">Yes, reset</button>
<button class="btn" onclick="closeResetConfirm()">Cancel</button>
</div>
</div>
</header>
<!-- Summary bar -->
<div class="summary" id="summaryBar"></div>
<!-- Budget categories -->
<div class="budget-grid" id="budgetGrid"></div>
<!-- Transactions -->
<div class="card">
<div class="tx-header">
<h2>Transactions</h2>
</div>
<div class="tx-form">
<div class="form-group">
<label>Description</label>
<input type="text" id="txDesc" placeholder="e.g. Groceries"/>
</div>
<div class="form-group">
<label>Amount ($)</label>
<input type="number" id="txAmount" placeholder="0.00" min="0" step="0.01"/>
</div>
<div class="form-group">
<label>Category</label>
<select id="txCat"></select>
</div>
<div class="form-group">
<label>&nbsp;</label>
<button class="btn success" onclick="addTransaction()">Add</button>
</div>
</div>
<table>
<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Category</th>
<th>Amount</th>
<th></th>
</tr>
</thead>
<tbody id="txBody"></tbody>
</table>
<div id="emptyTx" class="empty-tx">No transactions yet this month.</div>
</div>
<!-- Add Category Modal -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<h3>New Category</h3>
<div class="form-group">
<label>Category Name</label>
<input type="text" id="newCatName" placeholder="e.g. Car Payment"/>
</div>
<div class="form-group">
<label>Monthly Budget ($)</label>
<input type="number" id="newCatBudget" placeholder="0.00" min="0" step="0.01"/>
</div>
<div class="modal-actions">
<button class="btn" onclick="closeModal()">Cancel</button>
<button class="btn success" onclick="addCategory()">Add</button>
</div>
</div>
</div>
<script>
 // ─── State ───────────────────────────────────────────────────────────────────
 const STORAGE_KEY = 'family_budget_v1';
 const defaultCategories = [
   { id: 'mortgage',  name: 'Mortgage',        budget: 0, spent: 0 },
   { id: 'tithing',   name: 'Tithing',          budget: 0, spent: 0, titheRate: 10 },
   { id: 'tara',      name: "Tara's Spending",  budget: 0, spent: 0 },
   { id: 'garett',    name: "Garett's Spending", budget: 0, spent: 0 },
   { id: 'groceries', name: 'Groceries',        budget: 0, spent: 0 },
   { id: 'utilities', name: 'Utilities',        budget: 0, spent: 0 },
 ];
 function loadState() {
   try {
     const raw = localStorage.getItem(STORAGE_KEY);
     if (raw) return JSON.parse(raw);
   } catch(e) {}
   return {
     categories: defaultCategories.map(c => ({...c})),
     transactions: [],
     month: currentMonthKey(),
     monthlyIncome: 0
   };
 }
 function saveState() {
   localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
 }
 function currentMonthKey() {
   const d = new Date();
   return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
 }
 function currentMonthLabel() {
   return new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
 }
 let state = loadState();
 // ─── Render ──────────────────────────────────────────────────────────────────
 function fmt(n) {
   return '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
 }
 function render() {
   document.getElementById('currentMonth').textContent = currentMonthLabel();
   const incEl = document.getElementById('incomeInput');
   if (state.monthlyIncome > 0) incEl.value = state.monthlyIncome;
   renderSummary();
   renderCategories();
   renderTransactions();
   populateCatSelect();
 }
 function renderSummary() {
   const income      = Number(state.monthlyIncome) || 0;
   const totalBudget = state.categories.reduce((s, c) => s + (Number(c.budget)||0), 0);
   const totalSpent  = state.categories.reduce((s, c) => s + (Number(c.spent)||0), 0);
   const unallocated = income - totalBudget;
   const remaining   = income - totalSpent;
   const el = document.getElementById('summaryBar');
   el.innerHTML = `
<div class="summary-stat">
<span class="s-label">Monthly Income</span>
<span class="s-val">${fmt(income)}</span>
</div>
<div class="summary-stat" style="border-left:1px solid #3a332c; padding-left:1.5rem;">
<span class="s-label">Budgeted</span>
<span class="s-val">${fmt(totalBudget)}</span>
</div>
<div class="summary-stat">
<span class="s-label">Unallocated</span>
<span class="s-val ${unallocated >= 0 ? 'green' : 'red'}">${fmt(unallocated)}</span>
</div>
<div class="summary-stat" style="border-left:1px solid #3a332c; padding-left:1.5rem;">
<span class="s-label">Spent</span>
<span class="s-val red">${fmt(totalSpent)}</span>
</div>
<div class="summary-stat">
<span class="s-label">True Remaining</span>
<span class="s-val ${remaining >= 0 ? 'green' : 'red'}">${fmt(remaining)}</span>
</div>
   `;
 }
 function renderCategories() {
   const grid = document.getElementById('budgetGrid');
   const income = Number(state.monthlyIncome) || 0;
   grid.innerHTML = '';
   state.categories.forEach((cat, idx) => {
     // Auto-calculate tithe budget from income
     if (cat.titheRate !== undefined) {
       cat.budget = Math.round(income * (Number(cat.titheRate) || 0) / 100 * 100) / 100;
     }
     const budget = Number(cat.budget) || 0;
     const spent  = Number(cat.spent)  || 0;
     const rem    = budget - spent;
     const pct    = budget > 0 ? Math.min((spent / budget) * 100, 100) : 0;
     const remClass = rem < 0 ? 'over' : (pct > 75 ? 'warn' : 'ok');
     const barColor = rem < 0 ? '#eb5757' : (pct > 75 ? '#e67e22' : '#6fcf97');
     const div = document.createElement('div');
     div.className = 'budget-item';
     const isTithe = cat.titheRate !== undefined;
     const titheRate = Number(cat.titheRate) || 0;
     const budgetSection = isTithe ? `
<label>Tithe Rate</label>
<div class="pct-row">
<input class="pct-input" type="number" min="0" max="100" step="0.1"
           value="${titheRate}"
           placeholder="10"
           onchange="updateTitheRate(${idx}, this.value)"/>
<span class="currency">%</span>
</div>
<div class="tithe-calc">= ${fmt(budget)} of ${fmt(income)}</div>
     ` : `
<label>Monthly Budget</label>
<div class="amount-row">
<span class="currency">$</span>
<input class="amount-input" type="number" min="0" step="0.01"
           value="${budget > 0 ? budget : ''}"
           placeholder="0.00"
           onchange="updateBudget(${idx}, this.value)"/>
</div>
     `;
     div.innerHTML = `
<button class="delete-cat" title="Remove category" onclick="deleteCategory(${idx})">✕</button>
<div class="category-name">
         ${escHtml(cat.name)}
         ${isTithe ? '<span class="tithe-badge">% of income</span>' : ''}
</div>
       ${budgetSection}
<div class="progress-bar">
<div class="progress-fill" style="width:${pct}%; background:${barColor};"></div>
</div>
<div class="spent-label">Spent: ${fmt(spent)}</div>
<div class="remaining ${remClass}">
         ${rem >= 0 ? '▲ ' + fmt(rem) + ' left' : '▼ ' + fmt(Math.abs(rem)) + ' over'}
</div>
     `;
     grid.appendChild(div);
   });
 }
 function renderTransactions() {
   const tbody = document.getElementById('txBody');
   const empty = document.getElementById('emptyTx');
   tbody.innerHTML = '';
   const txs = [...state.transactions].reverse();
   if (txs.length === 0) { empty.style.display = 'block'; return; }
   empty.style.display = 'none';
   txs.forEach((tx) => {
     const origIdx = state.transactions.length - 1 - txs.indexOf(tx);
     const tr = document.createElement('tr');
     tr.innerHTML = `
<td>${tx.date}</td>
<td>${escHtml(tx.desc)}</td>
<td class="tx-cat">${escHtml(tx.cat)}</td>
<td class="tx-amount">${fmt(tx.amount)}</td>
<td><button class="tx-delete" onclick="deleteTransaction(${origIdx})">✕</button></td>
     `;
     tbody.appendChild(tr);
   });
 }
 function populateCatSelect() {
   const sel = document.getElementById('txCat');
   const cur = sel.value;
   sel.innerHTML = state.categories.map(c =>
     `<option value="${escHtml(c.id)}" ${c.id === cur ? 'selected' : ''}>${escHtml(c.name)}</option>`
   ).join('');
 }
 function escHtml(str) {
   return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
 }
 // ─── Actions ─────────────────────────────────────────────────────────────────
 function updateIncome(val) {
   state.monthlyIncome = parseFloat(val) || 0;
   saveState();
   renderSummary();
   renderCategories(); // tithe budget recalculates from income
 }
 function updateTitheRate(idx, val) {
   const income = Number(state.monthlyIncome) || 0;
   state.categories[idx].titheRate = parseFloat(val) || 0;
   state.categories[idx].budget = Math.round(income * state.categories[idx].titheRate / 100 * 100) / 100;
   saveState();
   renderSummary();
   renderCategories();
 }
 function updateBudget(idx, val) {
   state.categories[idx].budget = parseFloat(val) || 0;
   saveState();
   renderSummary();
   renderCategories();
 }
 function addTransaction() {
   const desc   = document.getElementById('txDesc').value.trim();
   const amount = parseFloat(document.getElementById('txAmount').value);
   const catId  = document.getElementById('txCat').value;
   if (!desc || isNaN(amount) || amount <= 0) {
     alert('Please enter a description and a valid amount.');
     return;
   }
   const cat = state.categories.find(c => c.id === catId);
   if (!cat) return;
   cat.spent = (Number(cat.spent) || 0) + amount;
   const now = new Date();
   state.transactions.push({
     id: Date.now(),
     date: now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
     desc, amount, cat: cat.name, catId
   });
   saveState();
   document.getElementById('txDesc').value = '';
   document.getElementById('txAmount').value = '';
   render();
 }
 function deleteTransaction(idx) {
   const tx = state.transactions[idx];
   const cat = state.categories.find(c => c.id === tx.catId);
   if (cat) cat.spent = Math.max(0, (Number(cat.spent)||0) - tx.amount);
   state.transactions.splice(idx, 1);
   saveState();
   render();
 }
 function deleteCategory(idx) {
   if (!confirm(`Remove "${state.categories[idx].name}"?`)) return;
   state.categories.splice(idx, 1);
   saveState();
   render();
 }
 function openModal() {
   document.getElementById('newCatName').value = '';
   document.getElementById('newCatBudget').value = '';
   document.getElementById('modalOverlay').classList.add('open');
   setTimeout(() => document.getElementById('newCatName').focus(), 50);
 }
 function closeModal() {
   document.getElementById('modalOverlay').classList.remove('open');
 }
 function addCategory() {
   const name   = document.getElementById('newCatName').value.trim();
   const budget = parseFloat(document.getElementById('newCatBudget').value) || 0;
   if (!name) { alert('Please enter a category name.'); return; }
   const id = name.toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + Date.now();
   state.categories.push({ id, name, budget, spent: 0 });
   saveState();
   closeModal();
   render();
 }
 function toggleResetConfirm() {
   const el = document.getElementById('resetConfirm');
   el.classList.toggle('open');
 }
 function closeResetConfirm() {
   document.getElementById('resetConfirm').classList.remove('open');
 }
 function resetMonth() {
   state.categories.forEach(c => c.spent = 0);
   state.transactions = [];
   state.month = currentMonthKey();
   // monthlyIncome is intentionally preserved across resets
   saveState();
   closeResetConfirm();
   render();
 }
 // Close modal on overlay click
 document.getElementById('modalOverlay').addEventListener('click', function(e) {
   if (e.target === this) closeModal();
 });
 // Enter key in modal
 document.getElementById('newCatBudget').addEventListener('keydown', e => {
   if (e.key === 'Enter') addCategory();
 });
 // ─── Init ────────────────────────────────────────────────────────────────────
 render();
</script>
</body>
